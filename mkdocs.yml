site_name: pico-jxglib
site_description: A collection of libraries and tools for Raspberry Pi Pico, including a powerful shell and various utilities to enhance your development experience.
copyright: "2025-2026, ypsitau"
repo_url: https://github.com/ypsitau/pico-jxglib
repo_name: ypsitau/pico-jxglib

nav:
    - Home: index.md
    - Shell Commands:
        - Overview: shell/index.md
        - File System:
            - Overview: shell/filesystem/index.md
            - File Operating Commands: shell/filesystem/file-operating-commands/index.md
            - SD Card: shell/filesystem/sdcard/index.md
        - Peripheral:
            - GPIO: shell/peripheral/gpio/index.md
            - PWM: shell/peripheral/pwm/index.md
            - I2C: shell/peripheral/i2c/index.md
            - SPI: shell/peripheral/spi/index.md
            - UART: shell/peripheral/uart/index.md
        - Device:
            - Built-in LED: shell/device/builtin-led/index.md
            - RTC (Real Time Clock): shell/device/rtc/index.md
        - Network:
            - Overview: shell/network/index.md
            - Wi-Fi Connection: shell/network/wifi/index.md
            - Network Utilities: shell/network/network-utilities/index.md
            - Telnet Server: shell/network/telnet-server/index.md
        - Logic Analyzer:
            - Text Mode: shell/logic-analyzer/text/index.md
            - PulseView: shell/logic-analyzer/pulseview/index.md
        - Display:
            - WS2812: shell/display/ws2812/index.md
        - Camera:
            - OV7670: shell/camera/ov7670/index.md
    - Library APIs:
        - Overview: library/index.md
        - Shell:
            - Overview: library/shell/index.md
            - Shell with Serial Interface: library/shell/shell/index.md
            - Shell with Display Device: library/shell/terminal/index.md
            - Command Line Editor: library/shell/cmdline-editor/index.md
            - Custom Commands: library/shell/custom-commands/index.md
        - File System:
            - Overview: library/filesystem/index.md
            - Internal Flash Memory: library/filesystem/flash/index.md
            - SD Card: library/filesystem/sdcard/index.md
            - USB Storage: library/filesystem/usb-storage/index.md
        - RTC (Real Time Clock): library/rtc/index.md
        - Display:
            - TFT LCD: library/display/tft-lcd/index.md
            - OLED: library/display/oled/index.md
            - WS2812: library/display/ws2812/index.md
        - USB Host:
            - Keyboard & Mouse: library/usbhost/keyboard-mouse/index.md
            - Game Pad: library/usbhost/gamepad/index.md
        - LVGL: library/lvgl/index.md
    - Applications:
        - Overview: applications/index.md
        - Character Recognizer: applications/character-recognizer/index.md
    - Development Environment:
        - Overview: development/index.md
        - Getting Started with Pico SDK: development/pico-sdk/index.md
        - Quick Guide to CMake: development/cmake/index.md

plugins:
    - include-markdown

theme:
    name: material
    icon:
        logo: material/chip
        repo: fontawesome/brands/github
    language: en
    palette:
        primary: indigo
    features:
        - navigation.tabs
        - navigation.tabs.sticky
        #- navigation.expand
        - content.code.copy

markdown_extensions:
    - pymdownx.highlight:
        anchor_linenums: true
        line_spans: __span
        pygments_lang_class: true
    - pymdownx.inlinehilite
    - pymdownx.snippets:
        base_path: ["docs", "src"]
        check_paths: true
    - admonition
    - pymdownx.details
    - pymdownx.tabbed:
        alternate_style: true
    - pymdownx.highlight:
        anchor_linenums: true
        line_spans: __span
        pygments_lang_class: true
    - pymdownx.inlinehilite
    - pymdownx.snippets
    - pymdownx.emoji:
        emoji_index: !!python/name:material.extensions.emoji.twemoji
        emoji_generator: !!python/name:material.extensions.emoji.to_svg
    - pymdownx.arithmatex:
        generic: true
    - footnotes
    - attr_list
    - md_in_html
    - def_list
    - pymdownx.superfences:
        custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

extra:
    analytics:
        provider: google
        property: G-RR9PCYFTE8

extra_javascript:
    - javascripts/mathjax.js
    - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

extra_css:
    - stylesheets/extra.css
