site_name: pico-jxglib
site_description: A collection of libraries and tools for Raspberry Pi Pico, including a powerful shell and various utilities to enhance your development experience.
copyright: "2025-2026, ypsitau"
nav:
  - Home: index.md
  - Command:
      - Shell: command/shell.md
      - Logic Analyzer: command/logic_analyzer.md
      - GPIO: command/gpio.md
      - I2C: command/i2c.md
      - SPI: command/spi.md
      - UART: command/uart.md
  - Library:
      - How to Use: library/how_to_use.md
theme:
  name: material
  icon:
    logo: material/chip
  language: en
  palette:
    primary: indigo
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - content.code.copy
markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
  